name: SOIC Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  soic-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/ -v

      - name: Run ruff
        run: ruff check .

      - name: SOIC CODE evaluation
        run: python -m soic_v3 evaluate --path . --domain CODE --output json > soic-report.json
        continue-on-error: true

      - name: Upload SOIC report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: soic-report
          path: soic-report.json
